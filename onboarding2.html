<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow | Tipos de ejercicios</title>
    <meta name="description" content="LinguaFlow, aplicación accesible para aprender inglés nivel B1 con lecciones interactivas.">
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="onboarding-page">
    <a href="#contenido-principal" class="skip-link">Saltar al contenido principal</a>

    <main id="contenido-principal" class="onboarding-wrapper" tabindex="-1">
        <section class="onboarding-card" aria-labelledby="titulo-ejercicios">
            <div class="onboarding-hero green-card">
                <div class="hero-icon" aria-hidden="true">🎯</div>
                <h1 id="titulo-ejercicios">Tipos de ejercicios</h1>
                <p>Practica con actividades B1 variadas que hacen el aprendizaje efectivo, entretenido y accesible.</p>
            </div>

            <section class="feature-list" aria-label="Tipos de actividades">
                <article class="feature-item" tabindex="0">
                    <span aria-hidden="true">⊙</span>
                    <p>Selección múltiple</p>
                </article>
                <article class="feature-item" tabindex="0">
                    <span aria-hidden="true">⊙</span>
                    <p>Completa la oración</p>
                </article>
                <article class="feature-item" tabindex="0">
                    <span aria-hidden="true">⊙</span>
                    <p>Ordena las palabras</p>
                </article>
                <article class="feature-item" tabindex="0">
                    <span aria-hidden="true">⊙</span>
                    <p>Traduce al inglés</p>
                </article>
            </section>
        </section>

        <nav class="dots" aria-label="Progreso de bienvenida">
            <span class="dot" aria-hidden="true"></span>
            <span class="dot active" aria-label="Paso 2 de 2"></span>
            <span class="dot" aria-hidden="true"></span>
            <span class="dot" aria-hidden="true"></span>
            <span class="dot" aria-hidden="true"></span>
        </nav>

        <a href="dashboard.html" class="primary-button">Comenzar <span aria-hidden="true">›</span></a>
    </main>
    <script type="module" src="/src/js/app.js"></script>
</body>
</html>
