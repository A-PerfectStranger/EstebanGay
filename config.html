<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow | Configuración</title>
    <meta name="description" content="LinguaFlow, aplicación accesible para aprender inglés nivel B1 con lecciones interactivas.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <a href="#contenido-principal" class="skip-link">Saltar al contenido principal</a>
    <header class="topbar">
        <a class="brand" href="dashboard.html" aria-label="LinguaFlow, ir al inicio">
            <span class="logo" data-icon="logo" data-icon-size="20"></span><strong>LinguaFlow</strong>
        </a>
    </header>
    <nav class="main-nav" aria-label="Navegación principal">
        <a href="dashboard.html"><span data-icon="home" data-icon-size="18"></span>Inicio</a>
        <a href="lecciones.html"><span data-icon="book" data-icon-size="18"></span>Lecciones</a>
        <a href="practica.html"><span data-icon="target" data-icon-size="18"></span>Práctica</a>
        <a href="progreso.html"><span data-icon="bar-chart" data-icon-size="18"></span>Progreso</a>
        <a href="config.html" class="active" aria-current="page"><span data-icon="settings" data-icon-size="18"></span>Config.</a>
    </nav>
    <main id="contenido-principal" class="page-container" tabindex="-1">
        <h1>Configuración de accesibilidad</h1>
        <form class="settings-form">
            <label for="nombre">Nombre del usuario</label>
            <input id="nombre" name="nombre" type="text" value="Alex">

            <label for="lectura">Velocidad de lectura por voz</label>
            <select id="lectura" name="lectura">
                <option value="lenta">Lenta</option>
                <option value="normal" selected>Normal</option>
                <option value="rapida">Rápida</option>
            </select>

            <label class="checkbox-label" for="alto-contraste">
                <input id="alto-contraste" type="checkbox">
                Activar modo de alto contraste
            </label>

            <button type="button" class="primary-button form-button" id="guardar-config">Guardar configuración</button>
            <p id="config-status" role="status" aria-live="polite"></p>
        </form>
    </main>
    <script type="module" src="/src/js/app.js"></script>
</body>
</html>
