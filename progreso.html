<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow | Progreso</title>
    <meta name="description" content="LinguaFlow, aplicación accesible para aprender inglés nivel B1 con lecciones interactivas.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <a href="#contenido-principal" class="skip-link">Saltar al contenido principal</a>
    <header class="topbar">
        <a class="brand" href="dashboard.html" aria-label="LinguaFlow, ir al inicio">
            <span class="logo" data-icon="logo" data-icon-size="20"></span><strong>LinguaFlow</strong>
        </a>
        <section class="status" aria-label="Estado del usuario">
            <span class="flame-stat" aria-label="Racha de días"><span data-icon="flame" data-icon-size="16"></span><span data-stat="streak">0</span></span>
            <span class="xp-stat" aria-label="Puntos de experiencia"><span data-icon="zap" data-icon-size="16"></span><span data-stat="xp">0</span></span>
        </section>
    </header>
    <nav class="main-nav" aria-label="Navegación principal">
        <a href="dashboard.html"><span data-icon="home" data-icon-size="18"></span>Inicio</a>
        <a href="lecciones.html"><span data-icon="book" data-icon-size="18"></span>Lecciones</a>
        <a href="practica.html"><span data-icon="target" data-icon-size="18"></span>Práctica</a>
        <a href="progreso.html" class="active" aria-current="page"><span data-icon="bar-chart" data-icon-size="18"></span>Progreso</a>
        <a href="config.html"><span data-icon="settings" data-icon-size="18"></span>Config.</a>
    </nav>
    <main id="contenido-principal" class="page-container" tabindex="-1">
        <h1>Progreso del nivel <span data-stat="level">A2</span></h1>
        <section class="welcome-panel small-panel" aria-labelledby="progreso-general">
            <h2 id="progreso-general">Avance general</h2>
            <label for="progreso-b1">Progreso del nivel B1</label>
            <progress id="progreso-b1" value="0" max="100" aria-label="0 por ciento del nivel B1 completado"></progress>
            <p>Has completado el <span data-stat="overall-percent">0%</span> de las 12 lecciones B1.</p>
        </section>
        <section class="stats-grid">
            <article class="stat-card" tabindex="0">
                <span data-icon="book"></span>
                <strong data-stat="lessons-completed">0</strong>
                <p>lecciones B1 completadas</p>
            </article>
            <article class="stat-card" tabindex="0">
                <span data-icon="target"></span>
                <strong data-stat="average-score">0%</strong>
                <p>promedio de aciertos</p>
            </article>
            <article class="stat-card" tabindex="0">
                <span data-icon="zap"></span>
                <strong data-stat="xp">0</strong>
                <p>XP acumulados</p>
            </article>
        </section>
    </main>
    <script type="module" src="/src/js/app.js"></script>
</body>
</html>
