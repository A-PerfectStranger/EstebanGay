<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFlow | Bienvenida</title>
    <meta name="description" content="LinguaFlow, aplicación accesible para aprender inglés nivel B1 con lecciones interactivas.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="onboarding-page">
    <a href="#onboarding-root" class="skip-link">Saltar al contenido principal</a>

    <button type="button" id="onboarding-skip" class="onboarding-skip" aria-label="Saltar la introducción e ir al inicio">Saltar</button>

    <main id="onboarding-root" class="onboarding-wrapper" tabindex="-1">
        <div id="onboarding-card">
            <section class="onboarding-card" aria-labelledby="onboarding-hero-title">
                <div id="onboarding-hero" class="onboarding-hero">
                    <div class="hero-icon" id="onboarding-hero-icon" aria-hidden="true"></div>
                    <h1 id="onboarding-hero-title"></h1>
                    <p id="onboarding-hero-desc"></p>
                </div>
                <section class="feature-list" id="onboarding-features" aria-label="Beneficios de este paso"></section>
            </section>
        </div>

        <nav class="dots" id="onboarding-dots" aria-label="Progreso de bienvenida"></nav>

        <div class="onboarding-nav">
            <button type="button" id="onboarding-back" class="secondary-button" hidden>
                <span aria-hidden="true">‹</span> Atrás
            </button>
            <button type="button" id="onboarding-next" class="primary-button"></button>
        </div>
    </main>
    <script type="module" src="/src/js/app.js"></script>
</body>
</html>
